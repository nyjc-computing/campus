name: Type Check

on:
  push:
    branches: [main, staging, weekly]
  pull_request:
    branches: [main, staging, weekly]
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  type-check:
    name: Type Check (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 3
    continue-on-error: ${{ matrix.python-version == '3.12' }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    env:
      ENV: testing
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          # Configure Poetry to use system Python (not its own bundled version)
          poetry config virtualenvs.create true
          poetry config virtualenvs.in-project true
      - name: Install Campus Suite
        run: poetry install --no-root
      - name: Run Type Checks
        run: poetry run python tests/run_tests.py type
