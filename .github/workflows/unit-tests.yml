name: Campus Tests

on:
  push:
    branches: [main, staging, weekly]
  pull_request:
    branches: [main, staging, weekly]

env:
  # Test timeout configuration (in seconds)
  UNIT_TEST_TIMEOUT: 60
  INTEGRATION_TEST_TIMEOUT: 300
  # Job timeout safety margins (in minutes) 
  UNIT_JOB_TIMEOUT: 3
  INTEGRATION_JOB_TIMEOUT: 8

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJson(env.UNIT_JOB_TIMEOUT) }}
    env:
      ENV: testing
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          # Configure Poetry to use system Python (not its own bundled version)
          poetry config virtualenvs.create true
          poetry config virtualenvs.in-project true
      - name: Install Campus Suite (full deployment mode)
        run: poetry install --no-root --extras full
      - name: Run Unit Tests
        run: poetry run python tests/run_tests.py unit --timeout ${{ env.UNIT_TEST_TIMEOUT }} -v

  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJson(env.INTEGRATION_JOB_TIMEOUT) }}
    # Run integration tests for all target branches
    # Required to pass for staging/main, optional for weekly
    continue-on-error: ${{ github.ref_name == 'weekly' || github.base_ref == 'weekly' }}
    env:
      ENV: testing
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          # Configure Poetry to use system Python (not its own bundled version)
          poetry config virtualenvs.create true
          poetry config virtualenvs.in-project true
      - name: Install Campus Suite (full deployment mode)
        run: poetry install --no-root --extras full
      - name: Run Integration Tests (required for staging/main, optional for weekly)
        run: poetry run python tests/run_tests.py integration --timeout ${{ env.INTEGRATION_TEST_TIMEOUT }} -v
