name: Integration Tests

on:
  push:
    branches: [main, staging, weekly]
  pull_request:
    branches: [main, staging, weekly]
    types: [opened, synchronize, reopened, ready_for_review]

env:
  INTEGRATION_TEST_TIMEOUT: 300

jobs:
  integration-tests:
    name: Integration Tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 8
    # Run integration tests for both supported versions.
    # Python 3.12 remains visible-but-optional during the migration window.
    # Weekly branch integration failures remain non-blocking as before.
    continue-on-error: ${{ matrix.python-version == '3.12' || github.base_ref == 'weekly' || (github.event_name == 'push' && github.ref_name == 'weekly') }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    env:
      ENV: testing
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          # Configure Poetry to use system Python (not its own bundled version)
          poetry config virtualenvs.create true
          poetry config virtualenvs.in-project true
      - name: Install Campus Suite
        run: poetry install --no-root
      - name: Run Integration Tests (required for staging/main, optional for weekly)
        run: poetry run python tests/run_tests.py integration --timeout ${{ env.INTEGRATION_TEST_TIMEOUT }}
