version: '3.8'
services:
  app:
    image: mcr.microsoft.com/devcontainers/python:3.11
    volumes:
      - ..:/workspaces/campus:cached
    command: sleep infinity
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=devuser
      - POSTGRES_PASSWORD=devpass
      - POSTGRES_DB=storagedb
      - POSTGRESDB_URI=postgresql://devuser:devpass@db:5432/storagedb
      - VAULTDB_URI=postgresql://devuser:devpass@db:5432/vaultdb
      - YAPPERDB_URI=postgresql://devuser:devpass@db:5432/yapperdb
    depends_on:
      - db
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER=devuser
      POSTGRES_PASSWORD=devpass
      POSTGRES_DB=storagedb
    ports:
      - "5432:5432"
    volumes:
      - /var/lib/postgresql/data
      - ./init-multi-db.sql:/docker-entrypoint-initdb.d/init-multi-db.sql:ro
